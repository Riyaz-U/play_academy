name: play_academy
description: "Football Academy Management System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.3.0

  # Cloud Functions caller
  cloud_functions: ^5.1.0

  # Payment
  razorpay_flutter: ^1.3.6

  # Charts
  fl_chart: ^0.70.0

  # Video playback
  video_player: ^2.9.2

  # QR code generation + scanning
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.4

  # Image picker (for video/thumbnail upload)
  image_picker: ^1.1.2
  firebase_storage: ^12.3.4

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
